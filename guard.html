<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASG | Guard Terminal</title>
    
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (Compat version for simple HTML integration) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        asg: {
                            dark: '#0f172a', card: '#1e293b', accent: '#f59e0b', accentHover: '#d97706',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .form-input { width: 100%; background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.6); border-radius: 4px; padding: 1rem; color: white; }
        .form-input:focus { outline: none; border-color: #f59e0b; }
        /* Hide scrollbar for a cleaner app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="absolute inset-0 z-50 bg-asg-dark flex flex-col justify-center items-center px-6">
        <i class="fas fa-shield-moon text-6xl text-asg-accent mb-6"></i>
        <h1 class="text-2xl font-bold tracking-widest mb-8">ASG COMMAND</h1>
        
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="email" placeholder="Assigned Email" class="form-input">
            <input type="password" id="password" placeholder="Password" class="form-input">
            <p id="auth-error" class="text-red-500 text-sm hidden"></p>
            <button onclick="login()" class="w-full py-4 bg-asg-accent text-black font-bold uppercase tracking-widest rounded mt-4">
                Authenticate
            </button>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden by default) -->
    <div id="app-screen" class="hidden h-full w-full flex flex-col">
        <!-- Topbar -->
        <header class="bg-asg-card py-4 px-6 flex justify-between items-center border-b border-slate-800">
            <div class="font-bold tracking-widest">TACTICAL DASHBOARD</div>
            <button onclick="logout()" class="text-slate-400 hover:text-white"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-6 relative">
            
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="flex flex-col items-center justify-center h-full">
                <div id="status-text" class="text-slate-400 font-bold tracking-widest mb-10 text-center uppercase">Standby - Ready for Deployment</div>
                
                <button id="duty-btn" onclick="toggleDuty()" class="w-48 h-48 md:w-64 md:h-64 mx-auto rounded-full border-4 border-green-500 bg-green-500/20 flex flex-col items-center justify-center transition-all duration-300 outline-none shadow-[0_0_30px_rgba(34,197,94,0.2)]">
                    <i id="duty-icon" class="fas fa-play-circle text-5xl md:text-6xl text-green-500 mb-2 md:mb-4"></i>
                    <span id="duty-label" class="text-lg md:text-xl font-bold text-green-500 tracking-widest">CHECK IN</span>
                </button>
            </div>

            <!-- History Tab -->
            <div id="tab-history" class="hidden h-full flex flex-col">
                <h2 class="text-asg-accent font-bold uppercase tracking-widest mb-4 text-sm">Duty Summary</h2>
                
                <!-- Statistics Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-asg-card p-3 rounded-lg border border-slate-700 text-center shadow-lg">
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">24 Hours</div>
                        <div id="stat-24h" class="text-lg md:text-xl font-black text-white">0h 0m</div>
                    </div>
                    <div class="bg-asg-card p-3 rounded-lg border border-slate-700 text-center shadow-lg">
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">7 Days</div>
                        <div id="stat-7d" class="text-lg md:text-xl font-black text-white">0h 0m</div>
                    </div>
                    <div class="bg-asg-card p-3 rounded-lg border border-slate-700 text-center shadow-lg">
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">30 Days</div>
                        <div id="stat-30d" class="text-lg md:text-xl font-black text-white">0h 0m</div>
                    </div>
                    <div class="bg-asg-card p-3 rounded-lg border border-slate-700 text-center shadow-lg">
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">365 Days</div>
                        <div id="stat-365d" class="text-lg md:text-xl font-black text-white">0h 0m</div>
                    </div>
                </div>

                <h2 class="text-asg-accent font-bold uppercase tracking-widest mb-4 text-sm">Recent Deployments</h2>
                <div id="history-list" class="space-y-3 flex-1 overflow-y-auto pb-20 pr-1">
                    <!-- Shift cards injected here via JS -->
                </div>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-asg-card border-t border-slate-800 flex justify-around py-4 pb-6">
            <button onclick="switchView('dashboard')" id="nav-dash" class="text-asg-accent flex flex-col items-center">
                <i class="fas fa-gps-fixed text-2xl mb-1"></i>
                <span class="text-xs uppercase tracking-widest">Duty</span>
            </button>
            <button onclick="switchView('history')" id="nav-hist" class="text-slate-500 flex flex-col items-center">
                <i class="fas fa-list text-2xl mb-1"></i>
                <span class="text-xs uppercase tracking-widest">History</span>
            </button>
        </nav>
    </div>

    <script>
    // ==========================================
    // 1. YOUR FIREBASE CONFIG
    // ==========================================
    const firebaseConfig = {
  apiKey: "AIzaSyB0APzpLavq-760Tqonk-1QBFJ548iHIH4",
  authDomain: "asg-security-6c996.firebaseapp.com",
  projectId: "asg-security-6c996",
  storageBucket: "asg-security-6c996.firebasestorage.app",
  messagingSenderId: "263955462065",
  appId: "1:263955462065:web:6212a45d8697a83bcf2f90",
  measurementId: "G-8CH28YZZ0G"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let isOnDuty = false;
    let currentShiftId = null;

    // ==========================================
    // AUTHENTICATION & REALTIME SYNC
    // ==========================================
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            // Start listening to real-time sync with mobile & history
            syncGuardStateAndHistory();
        } else {
            currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errEl = document.getElementById('auth-error');
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            errEl.classList.add('hidden');
        } catch (e) {
            errEl.textContent = e.message;
            errEl.classList.remove('hidden');
        }
    }

    function logout() { auth.signOut(); }

    // ==========================================
    // REALTIME SYNC & CLIENT-SIDE HISTORY
    // ==========================================
    function syncGuardStateAndHistory() {
        db.collection('shifts')
          .where('guardId', '==', currentUser.uid)
          .onSnapshot(snapshot => {
              const list = document.getElementById('history-list');
              list.innerHTML = ''; 

              let shifts = [];
              let activeShift = null;

              // Time buckets for statistics (in milliseconds)
              let totalMs24h = 0;
              let totalMs7d = 0;
              let totalMs30d = 0;
              let totalMs365d = 0;

              const now = new Date();
              const ms24h = 24 * 60 * 60 * 1000;
              const ms7d = 7 * ms24h;
              const ms30d = 30 * ms24h;
              const ms365d = 365 * ms24h;

              snapshot.forEach(doc => {
                  const data = doc.data();
                  data.id = doc.id;
                  shifts.push(data);

                  if (data.status === 'active') {
                      activeShift = data;
                  }

                  // --- STATISTIC CALCULATIONS ---
                  if (data.checkInTime) {
                      const checkInDate = data.checkInTime.toDate();
                      const timeSinceCheckIn = now - checkInDate;
                      
                      let shiftDurationMs = 0;
                      if (data.checkOutTime) {
                          // Completed shift
                          shiftDurationMs = data.checkOutTime.toDate() - checkInDate;
                      } else {
                          // Active shift (calculate duration up to this exact moment)
                          shiftDurationMs = now - checkInDate;
                      }

                      // Allocate duration to the correct time buckets
                      if (timeSinceCheckIn <= ms24h) totalMs24h += shiftDurationMs;
                      if (timeSinceCheckIn <= ms7d) totalMs7d += shiftDurationMs;
                      if (timeSinceCheckIn <= ms30d) totalMs30d += shiftDurationMs;
                      if (timeSinceCheckIn <= ms365d) totalMs365d += shiftDurationMs;
                  }
              });

              // Helper function to convert milliseconds to "Xh Ym"
              const formatStat = (ms) => {
                  let totalMins = Math.floor(ms / 60000);
                  let hrs = Math.floor(totalMins / 60);
                  let mins = totalMins % 60;
                  return `${hrs}h ${mins}m`;
              };

              // Update the UI Dashboards
              document.getElementById('stat-24h').textContent = formatStat(totalMs24h);
              document.getElementById('stat-7d').textContent = formatStat(totalMs7d);
              document.getElementById('stat-30d').textContent = formatStat(totalMs30d);
              document.getElementById('stat-365d').textContent = formatStat(totalMs365d);

              // --- DUTY UI TOGGLE ---
              if (activeShift) {
                  isOnDuty = true;
                  currentShiftId = activeShift.id;
                  updateDutyUI(true);
              } else {
                  isOnDuty = false;
                  currentShiftId = null;
                  updateDutyUI(false);
              }

              // --- RENDER HISTORY LIST ---
              shifts.sort((a, b) => {
                  let timeA = a.checkInTime ? a.checkInTime.toDate() : new Date();
                  let timeB = b.checkInTime ? b.checkInTime.toDate() : new Date();
                  return timeB - timeA;
              });

              if (shifts.length === 0) {
                  list.innerHTML = '<div class="text-center text-slate-500 py-8">No deployment history found.</div>';
                  return;
              }

              shifts.forEach(data => {
                  if (!data.checkInTime) return;

                  const checkInDate = data.checkInTime.toDate();
                  
                  const year = checkInDate.getFullYear();
                  const month = String(checkInDate.getMonth() + 1).padStart(2, '0');
                  const day = String(checkInDate.getDate()).padStart(2, '0');
                  const dateStr = `${year}-${month}-${day}`;
                  
                  let outStr = 'ACTIVE';
                  let durStr = 'Ongoing';
                  let iconColor = 'text-green-500';

                  if (data.checkOutTime) {
                      const checkOutDate = data.checkOutTime.toDate();
                      outStr = checkOutDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                      
                      let diffMs = checkOutDate - checkInDate;
                      let diffMins = Math.floor(diffMs / 60000);
                      let diffHrs = Math.floor(diffMins / 60);
                      let diffDays = Math.floor(diffHrs / 24);
                      let diffMonths = Math.floor(diffDays / 30);
                      let diffYears = Math.floor(diffMonths / 12);

                      let mins = diffMins % 60;
                      let hrs = diffHrs % 24;
                      let days = diffDays % 30;
                      let mos = diffMonths % 12;

                      let durParts = [];
                      if (diffYears > 0) durParts.push(`${diffYears}y`);
                      if (mos > 0) durParts.push(`${mos}mo`);
                      if (days > 0) durParts.push(`${days}d`);
                      if (hrs > 0) durParts.push(`${hrs}h`);
                      if (mins > 0 || durParts.length === 0) durParts.push(`${mins}m`);

                      durStr = durParts.join(' ');
                      iconColor = 'text-asg-accent';
                  }

                  const html = `
                      <div class="bg-asg-card p-4 rounded-lg border border-slate-700 flex justify-between items-center mb-3">
                          <div class="flex items-center space-x-4">
                              <i class="fas fa-clock ${iconColor} text-xl"></i>
                              <div>
                                  <div class="font-bold text-sm text-white">${dateStr}</div>
                                  <div class="text-[11px] text-slate-400">In: ${checkInDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} - Out: ${outStr}</div>
                              </div>
                          </div>
                          <div class="font-bold text-sm text-white text-right max-w-[80px] leading-tight">${durStr}</div>
                      </div>
                  `;
                  list.innerHTML += html;
              });
          }, error => {
              console.error("Firestore sync error:", error);
          });
    }
    // Dynamic UI Toggle for Duty Button
    function updateDutyUI(active) {
        const btn = document.getElementById('duty-btn');
        const icon = document.getElementById('duty-icon');
        const label = document.getElementById('duty-label');
        const status = document.getElementById('status-text');

        if (active) {
            btn.className = "w-48 h-48 md:w-64 md:h-64 mx-auto rounded-full border-4 border-red-500 bg-red-500/20 flex flex-col items-center justify-center transition-all duration-300 outline-none shadow-[0_0_30px_rgba(239,68,68,0.2)]";
            icon.className = "fas fa-stop-circle text-5xl md:text-6xl text-red-500 mb-2 md:mb-4";
            label.className = "text-lg md:text-xl font-bold text-red-500 tracking-widest";
            label.textContent = "CHECK OUT";
            status.textContent = "DUTY ACTIVE - GPS LOGGED";
            status.className = "text-red-500 font-bold tracking-widest mb-8 text-center uppercase";
        } else {
            btn.className = "w-48 h-48 md:w-64 md:h-64 mx-auto rounded-full border-4 border-green-500 bg-green-500/20 flex flex-col items-center justify-center transition-all duration-300 outline-none shadow-[0_0_30px_rgba(34,197,94,0.2)]";
            icon.className = "fas fa-play-circle text-5xl md:text-6xl text-green-500 mb-2 md:mb-4";
            label.className = "text-lg md:text-xl font-bold text-green-500 tracking-widest";
            label.textContent = "CHECK IN";
            status.textContent = "Standby - Ready for Deployment";
            status.className = "text-slate-400 font-bold tracking-widest mb-8 text-center uppercase";
        }
    }

    // ==========================================
    // GPS & TOGGLE DUTY
    // ==========================================
    async function toggleDuty() {
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser");
            return;
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            // Construct the clickable Google Maps URL
            const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

            if (!isOnDuty) {
                // Check In
                await db.collection('shifts').add({
                    guardId: currentUser.uid,
                    guardEmail: currentUser.email,
                    checkInTime: firebase.firestore.FieldValue.serverTimestamp(),
                    checkInMapUrl: mapLink, // Saving as a clickable URL
                    status: 'active'
                });
            } else {
                // Check Out
                if (currentShiftId) {
                    await db.collection('shifts').doc(currentShiftId).update({
                        checkOutTime: firebase.firestore.FieldValue.serverTimestamp(),
                        checkOutMapUrl: mapLink, // Saving as a clickable URL
                        status: 'completed'
                    });
                }
            }
        }, (error) => {
            alert("Location permission is required to check in/out.");
        });
    }

    // ==========================================
    // VIEW NAVIGATION
    // ==========================================
    function switchView(view) {
        const dash = document.getElementById('tab-dashboard');
        const hist = document.getElementById('tab-history');
        const navDash = document.getElementById('nav-dash');
        const navHist = document.getElementById('nav-hist');

        if (view === 'dashboard') {
            dash.classList.remove('hidden');
            hist.classList.add('hidden');
            navDash.classList.replace('text-slate-500', 'text-asg-accent');
            navHist.classList.replace('text-asg-accent', 'text-slate-500');
        } else {
            dash.classList.add('hidden');
            hist.classList.remove('hidden');
            navHist.classList.replace('text-slate-500', 'text-asg-accent');
            navDash.classList.replace('text-asg-accent', 'text-slate-500');
        }
    }
</script>
</body>
</html>
